services:
  nats:
    image: nats:2.10
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 5s
      timeout: 3s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  openclaw:
    image: openclaw/openclaw:latest
    ports:
      - "3000:3000"
      - "18789:18789"
    volumes:
      - ./config/openclaw:/workspace/config
    environment:
      OLLAMA_BASE_URL: http://ollama:11434/v1
    depends_on:
      ollama:
        condition: service_healthy

  bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    ports:
      - "8100:8100"
    environment:
      NATS_URL: nats://nats:4222
      BRIDGE_PORT: "8100"
    depends_on:
      nats:
        condition: service_healthy

  intercept-proxy:
    build:
      context: .
      dockerfile: Dockerfile.intercept
    ports:
      - "8200:8200"
    environment:
      NATS_URL: nats://nats:4222
      INTERCEPT_PORT: "8200"
      INTERCEPT_BACKEND_URL: http://ollama:11434
      INTERCEPT_ENABLED: "true"
    depends_on:
      nats:
        condition: service_healthy
      ollama:
        condition: service_healthy

  training:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      INFERENCE_BACKEND: openai
      INFERENCE_BASE_URL: http://intercept-proxy:8200/v1
      LLM_MODEL: qwen2.5:1.5b
      META_RL_ENABLED: "true"
    depends_on:
      nats:
        condition: service_healthy
      ollama:
        condition: service_healthy
      intercept-proxy:
        condition: service_started
    command: python -m src.services.training

volumes:
  ollama_data:
