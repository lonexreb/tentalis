<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#111820"/>
    </linearGradient>
    <linearGradient id="accentBlend" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    <linearGradient id="octoBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="octoShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="tentGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="tentGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="tentGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="orbGlow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="orbGlow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="octoGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bgGrad)"/>

  <!-- Dot grid -->
  <g opacity="0.05">
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.7" fill="#e2e8f0"/>
    </pattern>
    <rect width="1280" height="320" fill="url(#dots)"/>
  </g>

  <!-- Ambient glow orbs -->
  <circle cx="240" cy="180" r="160" fill="url(#orbGlow1)" filter="url(#bigGlow)" opacity="0.5"/>
  <circle cx="1040" cy="180" r="160" fill="url(#orbGlow2)" filter="url(#bigGlow)" opacity="0.4"/>

  <!-- Flowing data streams -->
  <g filter="url(#softGlow)" opacity="0.1">
    <path d="M 0,28 Q 160,12 320,26 Q 480,40 640,22 Q 800,8 960,28 Q 1120,48 1280,32" stroke="#7c3aed" stroke-width="1" fill="none"/>
    <path d="M 0,292 Q 160,278 320,290 Q 480,302 640,284 Q 800,268 960,288 Q 1120,308 1280,292" stroke="#14b8a6" stroke-width="1" fill="none"/>
  </g>

  <!-- ===== OCTOPUS MASCOT (left-center) ===== -->
  <g transform="translate(195, 185)" filter="url(#octoGlow)">

    <!-- Tentacle 1: reaching right toward Task node -->
    <path d="M 18,10 Q 60,5 95,-10 Q 115,-18 108,-24" stroke="url(#tentGrad1)" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <circle cx="108" cy="-24" r="2.5" fill="#8b5cf6" opacity="0.6"/>

    <!-- Tentacle 2: reaching far right toward Solve -->
    <path d="M 22,5 Q 80,-5 140,-15 Q 200,-22 240,-18" stroke="url(#tentGrad2)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.55"/>
    <circle cx="240" cy="-18" r="2" fill="#6366f1" opacity="0.5"/>

    <!-- Tentacle 3: reaching down-right toward Train -->
    <path d="M 15,18 Q 55,40 100,48 Q 140,55 155,50" stroke="url(#tentGrad3)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
    <circle cx="155" cy="50" r="2" fill="#14b8a6" opacity="0.5"/>

    <!-- Tentacle 4: reaching down toward Improve -->
    <path d="M 5,20 Q 20,50 50,60 Q 80,68 105,58" stroke="url(#tentGrad2)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.55"/>
    <circle cx="105" cy="58" r="2" fill="#818cf8" opacity="0.5"/>

    <!-- Tentacle 5: reaching left-down (decorative) -->
    <path d="M -12,18 Q -35,40 -50,55 Q -60,65 -55,70" stroke="#8b5cf6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
    <circle cx="-55" cy="70" r="2" fill="#a78bfa" opacity="0.4"/>

    <!-- Tentacle 6: reaching left (decorative) -->
    <path d="M -18,8 Q -45,10 -65,18 Q -80,25 -78,32" stroke="#7c3aed" stroke-width="2.8" fill="none" stroke-linecap="round" opacity="0.45"/>
    <circle cx="-78" cy="32" r="2" fill="#7c3aed" opacity="0.4"/>

    <!-- Tentacle 7: reaching up-left (decorative) -->
    <path d="M -15,-5 Q -38,-20 -52,-35 Q -60,-45 -55,-50" stroke="#8b5cf6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
    <circle cx="-55" cy="-50" r="1.8" fill="#a78bfa" opacity="0.35"/>

    <!-- Tentacle 8: reaching up (decorative) -->
    <path d="M 0,-18 Q 5,-40 -5,-55 Q -10,-65 -5,-70" stroke="#7c3aed" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
    <circle cx="-5" cy="-70" r="1.8" fill="#c4b5fd" opacity="0.35"/>

    <!-- Main body (head dome) -->
    <ellipse cx="0" cy="-4" rx="22" ry="26" fill="url(#octoBody)" opacity="0.9"/>
    <!-- Shine highlight -->
    <ellipse cx="-6" cy="-14" rx="8" ry="12" fill="url(#octoShine)"/>

    <!-- Eyes -->
    <ellipse cx="-7" cy="-2" rx="5" ry="5.5" fill="#0d1117"/>
    <ellipse cx="7" cy="-2" rx="5" ry="5.5" fill="#0d1117"/>
    <!-- Pupils (looking right, toward the loop) -->
    <ellipse cx="-5" cy="-2" rx="2.5" ry="3" fill="#e2e8f0"/>
    <ellipse cx="9" cy="-2" rx="2.5" ry="3" fill="#e2e8f0"/>
    <!-- Eye glints -->
    <circle cx="-4" cy="-4" r="1" fill="#ffffff" opacity="0.9"/>
    <circle cx="10" cy="-4" r="1" fill="#ffffff" opacity="0.9"/>

    <!-- Subtle smile -->
    <path d="M -5,8 Q 0,12 5,8" stroke="#4c1d95" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Suction cup dots on visible tentacles -->
    <circle cx="45" cy="4" r="1.2" fill="#c4b5fd" opacity="0.3"/>
    <circle cx="70" cy="-2" r="1" fill="#c4b5fd" opacity="0.25"/>
    <circle cx="40" cy="35" r="1.2" fill="#a78bfa" opacity="0.25"/>
    <circle cx="70" cy="45" r="1" fill="#a78bfa" opacity="0.2"/>
    <circle cx="-30" cy="30" r="1" fill="#a78bfa" opacity="0.2"/>
  </g>

  <!-- ===== CONTINUOUS LEARNING LOOP ===== -->

  <!-- "CONTINUOUS LEARNING LOOP" label -->
  <text x="680" y="118" text-anchor="middle" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" font-weight="500" letter-spacing="2">CONTINUOUS LEARNING LOOP</text>

  <!-- Connection arrows -->
  <g filter="url(#glow)">
    <!-- Task -> Solve -->
    <line x1="435" y1="160" x2="530" y2="160" stroke="#7c3aed" stroke-width="1.8" opacity="0.6"/>
    <polygon points="530,155 540,160 530,165" fill="#7c3aed" opacity="0.7"/>

    <!-- Solve -> Score -->
    <line x1="630" y1="160" x2="725" y2="160" stroke="#6366f1" stroke-width="1.8" opacity="0.6"/>
    <polygon points="725,155 735,160 725,165" fill="#6366f1" opacity="0.7"/>

    <!-- Score -> Train (curve down) -->
    <path d="M 815,170 Q 860,200 880,218" stroke="#14b8a6" stroke-width="1.8" fill="none" opacity="0.6"/>
    <polygon points="875,213 883,223 885,211" fill="#14b8a6" opacity="0.7"/>

    <!-- Train -> Improve -->
    <line x1="860" y1="237" x2="755" y2="237" stroke="#0d9488" stroke-width="1.8" opacity="0.6"/>
    <polygon points="755,232 745,237 755,242" fill="#0d9488" opacity="0.7"/>

    <!-- Improve -> Task (curve back up) -->
    <path d="M 655,225 Q 520,200 430,175" stroke="#7c3aed" stroke-width="1.8" fill="none" opacity="0.6"/>
    <polygon points="435,170 425,174 433,182" fill="#7c3aed" opacity="0.7"/>
  </g>

  <!-- TASK node -->
  <g filter="url(#nodeGlow)">
    <rect x="355" y="141" width="78" height="38" rx="10" fill="#0d1117" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="394" y="165" text-anchor="middle" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700">Task</text>
  </g>

  <!-- SOLVE node -->
  <g filter="url(#nodeGlow)">
    <rect x="545" y="141" width="78" height="38" rx="10" fill="#0d1117" stroke="#6366f1" stroke-width="1.5"/>
    <text x="584" y="165" text-anchor="middle" fill="#818cf8" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700">Solve</text>
  </g>

  <!-- SCORE node -->
  <g filter="url(#nodeGlow)">
    <rect x="738" y="141" width="78" height="38" rx="10" fill="#0d1117" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="777" y="165" text-anchor="middle" fill="#2dd4bf" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700">Score</text>
  </g>

  <!-- TRAIN node -->
  <g filter="url(#nodeGlow)">
    <rect x="860" y="218" width="78" height="38" rx="10" fill="#0d1117" stroke="#0d9488" stroke-width="1.5"/>
    <text x="899" y="242" text-anchor="middle" fill="#14b8a6" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700">Train</text>
  </g>

  <!-- IMPROVE node -->
  <g filter="url(#nodeGlow)">
    <rect x="655" y="218" width="95" height="38" rx="10" fill="#0d1117" stroke="#6366f1" stroke-width="1.5"/>
    <text x="702" y="242" text-anchor="middle" fill="#818cf8" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700">Improve</text>
  </g>

  <!-- Right-side decorative: small agent icons -->
  <!-- Manager mini icon -->
  <g transform="translate(1020, 145)" opacity="0.5">
    <circle cx="0" cy="0" r="14" fill="#0d1117" stroke="#7c3aed" stroke-width="1"/>
    <circle cx="0" cy="-3" r="4" fill="none" stroke="#a78bfa" stroke-width="0.9"/>
    <path d="M -6,5 Q 0,2 6,5" stroke="#a78bfa" stroke-width="0.9" fill="none"/>
    <path d="M -3,-9 L -2,-7 L 0,-8.5 L 2,-7 L 3,-9" stroke="#c4b5fd" stroke-width="0.7" fill="none"/>
    <text x="0" y="24" text-anchor="middle" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="500" letter-spacing="0.5">Manager</text>
  </g>

  <!-- Worker mini icon -->
  <g transform="translate(1020, 220)" opacity="0.5">
    <circle cx="0" cy="0" r="14" fill="#0d1117" stroke="#14b8a6" stroke-width="1"/>
    <circle cx="0" cy="-3" r="4" fill="none" stroke="#2dd4bf" stroke-width="0.9"/>
    <path d="M -6,5 Q 0,2 6,5" stroke="#2dd4bf" stroke-width="0.9" fill="none"/>
    <circle cx="6" cy="-7" r="2.5" fill="none" stroke="#5eead4" stroke-width="0.6"/>
    <text x="0" y="24" text-anchor="middle" fill="#2dd4bf" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="500" letter-spacing="0.5">Worker</text>
  </g>

  <!-- Dashed lines from mini icons to loop -->
  <g opacity="0.25">
    <line x1="1005" y1="145" x2="940" y2="232" stroke="#7c3aed" stroke-width="0.8" stroke-dasharray="3,3"/>
    <line x1="1005" y1="220" x2="940" y2="232" stroke="#14b8a6" stroke-width="0.8" stroke-dasharray="3,3"/>
  </g>

  <!-- Scattered neural dots (right side) -->
  <g opacity="0.08">
    <circle cx="1100" cy="80" r="1.5" fill="#14b8a6"/>
    <circle cx="1140" cy="120" r="1.2" fill="#7c3aed"/>
    <circle cx="1080" cy="140" r="1.5" fill="#14b8a6"/>
    <circle cx="1160" cy="170" r="1" fill="#a78bfa"/>
    <circle cx="1120" cy="200" r="1.5" fill="#14b8a6"/>
    <circle cx="1180" cy="230" r="1.2" fill="#7c3aed"/>
    <circle cx="1100" cy="260" r="1.5" fill="#14b8a6"/>
    <line x1="1100" y1="80" x2="1140" y2="120" stroke="#14b8a6" stroke-width="0.4"/>
    <line x1="1140" y1="120" x2="1080" y2="140" stroke="#7c3aed" stroke-width="0.4"/>
    <line x1="1080" y1="140" x2="1160" y2="170" stroke="#14b8a6" stroke-width="0.4"/>
    <line x1="1160" y1="170" x2="1120" y2="200" stroke="#7c3aed" stroke-width="0.4"/>
    <line x1="1120" y1="200" x2="1180" y2="230" stroke="#14b8a6" stroke-width="0.4"/>
    <line x1="1180" y1="230" x2="1100" y2="260" stroke="#7c3aed" stroke-width="0.4"/>
  </g>

  <!-- ===== TITLE ===== -->
  <text x="640" y="50" text-anchor="middle" fill="url(#titleGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" letter-spacing="3">Tentalis</text>

  <!-- Subtitle -->
  <text x="640" y="80" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="13.5" font-weight="400">ADHR meta-RL framework — agents that learn from manager feedback</text>

  <!-- Accent line under subtitle -->
  <line x1="450" y1="92" x2="830" y2="92" stroke="url(#accentBlend)" stroke-width="1.2" opacity="0.3"/>

  <!-- ===== BOTTOM TECH BAR ===== -->
  <g opacity="0.45">
    <text x="640" y="286" text-anchor="middle" fill="#64748b" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="9.5" letter-spacing="2.5">GRPO + OPD  ·  NATS PUB/SUB  ·  PROCESS REWARDS  ·  META-RL  ·  LoRA HOT-SWAP</text>
  </g>

  <!-- Phase badge -->
  <g transform="translate(640, 302)">
    <rect x="-48" y="-10" width="96" height="18" rx="9" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.3"/>
    <text x="0" y="3" text-anchor="middle" fill="#818cf8" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" font-weight="600" letter-spacing="1" opacity="0.45">PHASE 9b</text>
  </g>
</svg>
