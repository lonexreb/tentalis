<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#111820"/>
    </linearGradient>
    <linearGradient id="accentPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="accentTeal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
    <linearGradient id="accentBlend" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    <linearGradient id="orbGlow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="orbGlow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.8" fill="#e2e8f0"/>
    </pattern>
    <rect width="1280" height="320" fill="url(#dots)"/>
  </g>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="160" r="180" fill="url(#orbGlow1)" filter="url(#bigGlow)" opacity="0.4"/>
  <circle cx="1080" cy="160" r="180" fill="url(#orbGlow2)" filter="url(#bigGlow)" opacity="0.35"/>

  <!-- Flowing data streams (top and bottom) -->
  <g filter="url(#softGlow)" opacity="0.12">
    <path d="M 0,30 Q 160,15 320,28 Q 480,42 640,25 Q 800,10 960,30 Q 1120,50 1280,35" stroke="#7c3aed" stroke-width="1.2" fill="none"/>
    <path d="M 0,290 Q 160,275 320,288 Q 480,300 640,282 Q 800,265 960,285 Q 1120,305 1280,290" stroke="#14b8a6" stroke-width="1.2" fill="none"/>
  </g>

  <!-- === LEFT: Manager Agent Cluster === -->
  <g transform="translate(148, 175)">
    <!-- Manager outer ring -->
    <circle cx="0" cy="0" r="36" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.25" stroke-dasharray="3,4"/>
    <!-- Manager node -->
    <g filter="url(#nodeGlow)">
      <circle cx="0" cy="0" r="24" fill="#0d1117" stroke="#7c3aed" stroke-width="1.5"/>
      <!-- Head -->
      <circle cx="0" cy="-6" r="6.5" fill="none" stroke="#a78bfa" stroke-width="1.3"/>
      <!-- Body -->
      <path d="M -10,8 Q 0,3 10,8" stroke="#a78bfa" stroke-width="1.3" fill="none"/>
      <!-- Crown -->
      <path d="M -6,-16 L -4,-12 L 0,-15 L 4,-12 L 6,-16" stroke="#c4b5fd" stroke-width="1" fill="none"/>
    </g>
    <text x="0" y="50" text-anchor="middle" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="1">MANAGER</text>
    <!-- Orbiting dots -->
    <circle cx="-30" cy="-20" r="1.5" fill="#7c3aed" opacity="0.5"/>
    <circle cx="28" cy="-25" r="1.2" fill="#a78bfa" opacity="0.4"/>
    <circle cx="32" cy="15" r="1.3" fill="#7c3aed" opacity="0.45"/>
  </g>

  <!-- === RIGHT: Worker Agent Cluster === -->
  <g transform="translate(1132, 175)">
    <!-- Worker outer ring -->
    <circle cx="0" cy="0" r="36" fill="none" stroke="#14b8a6" stroke-width="0.8" opacity="0.25" stroke-dasharray="3,4"/>
    <!-- Worker node -->
    <g filter="url(#nodeGlow)">
      <circle cx="0" cy="0" r="24" fill="#0d1117" stroke="#14b8a6" stroke-width="1.5"/>
      <!-- Head -->
      <circle cx="0" cy="-6" r="6.5" fill="none" stroke="#2dd4bf" stroke-width="1.3"/>
      <!-- Body -->
      <path d="M -10,8 Q 0,3 10,8" stroke="#2dd4bf" stroke-width="1.3" fill="none"/>
      <!-- Gear -->
      <circle cx="9" cy="-12" r="4" fill="none" stroke="#5eead4" stroke-width="0.9"/>
      <line x1="9" y1="-17" x2="9" y2="-7" stroke="#5eead4" stroke-width="0.6"/>
      <line x1="5" y1="-12" x2="13" y2="-12" stroke="#5eead4" stroke-width="0.6"/>
    </g>
    <text x="0" y="50" text-anchor="middle" fill="#2dd4bf" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="1">WORKER</text>
    <!-- Orbiting dots -->
    <circle cx="-28" cy="-22" r="1.5" fill="#14b8a6" opacity="0.5"/>
    <circle cx="30" cy="-18" r="1.2" fill="#2dd4bf" opacity="0.4"/>
    <circle cx="-25" cy="20" r="1.3" fill="#14b8a6" opacity="0.45"/>
  </g>

  <!-- === CENTER: Continuous Learning Loop === -->

  <!-- Dashed connection: Manager to loop -->
  <g opacity="0.4">
    <line x1="188" y1="170" x2="310" y2="158" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,4"/>
  </g>
  <!-- Dashed connection: Worker to loop -->
  <g opacity="0.4">
    <line x1="1098" y1="170" x2="970" y2="158" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,4"/>
  </g>

  <!-- Connection arrows -->
  <g filter="url(#glow)">
    <!-- Task -> Solve -->
    <line x1="386" y1="157" x2="488" y2="157" stroke="#7c3aed" stroke-width="1.8" opacity="0.6"/>
    <polygon points="488,152 498,157 488,162" fill="#7c3aed" opacity="0.7"/>

    <!-- Solve -> Score -->
    <line x1="586" y1="157" x2="688" y2="157" stroke="#6366f1" stroke-width="1.8" opacity="0.6"/>
    <polygon points="688,152 698,157 688,162" fill="#6366f1" opacity="0.7"/>

    <!-- Score -> Train (curve down) -->
    <path d="M 780,167 Q 830,200 855,218" stroke="#14b8a6" stroke-width="1.8" fill="none" opacity="0.6"/>
    <polygon points="850,213 858,223 860,211" fill="#14b8a6" opacity="0.7"/>

    <!-- Train -> Improve -->
    <line x1="830" y1="232" x2="720" y2="232" stroke="#0d9488" stroke-width="1.8" opacity="0.6"/>
    <polygon points="720,227 710,232 720,237" fill="#0d9488" opacity="0.7"/>

    <!-- Improve -> Task (curve back up) -->
    <path d="M 625,222 Q 480,195 390,172" stroke="#7c3aed" stroke-width="1.8" fill="none" opacity="0.6"/>
    <polygon points="395,167 385,171 393,179" fill="#7c3aed" opacity="0.7"/>
  </g>

  <!-- TASK node -->
  <g filter="url(#nodeGlow)">
    <rect x="310" y="138" width="76" height="38" rx="10" fill="#0d1117" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="348" y="162" text-anchor="middle" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700">Task</text>
  </g>

  <!-- SOLVE node -->
  <g filter="url(#nodeGlow)">
    <rect x="500" y="138" width="76" height="38" rx="10" fill="#0d1117" stroke="#6366f1" stroke-width="1.5"/>
    <text x="538" y="162" text-anchor="middle" fill="#818cf8" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700">Solve</text>
  </g>

  <!-- SCORE node -->
  <g filter="url(#nodeGlow)">
    <rect x="700" y="138" width="76" height="38" rx="10" fill="#0d1117" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="738" y="162" text-anchor="middle" fill="#2dd4bf" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700">Score</text>
  </g>

  <!-- TRAIN node -->
  <g filter="url(#nodeGlow)">
    <rect x="830" y="213" width="76" height="38" rx="10" fill="#0d1117" stroke="#0d9488" stroke-width="1.5"/>
    <text x="868" y="237" text-anchor="middle" fill="#14b8a6" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700">Train</text>
  </g>

  <!-- IMPROVE node -->
  <g filter="url(#nodeGlow)">
    <rect x="625" y="213" width="90" height="38" rx="10" fill="#0d1117" stroke="#6366f1" stroke-width="1.5"/>
    <text x="670" y="237" text-anchor="middle" fill="#818cf8" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700">Improve</text>
  </g>

  <!-- Small label above the loop -->
  <text x="640" y="126" text-anchor="middle" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" font-weight="500" letter-spacing="2">CONTINUOUS LEARNING LOOP</text>

  <!-- === TITLE === -->
  <text x="640" y="52" text-anchor="middle" fill="url(#titleGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" letter-spacing="2">Tentalis</text>

  <!-- Subtitle -->
  <text x="640" y="80" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="13.5" font-weight="400">ADHR meta-RL framework — agents that learn from manager feedback</text>

  <!-- Decorative accent line under subtitle -->
  <line x1="460" y1="92" x2="820" y2="92" stroke="url(#accentBlend)" stroke-width="1.2" opacity="0.35"/>

  <!-- === BOTTOM TECH BAR === -->
  <g opacity="0.45">
    <text x="640" y="285" text-anchor="middle" fill="#64748b" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="9.5" letter-spacing="2.5">GRPO + OPD  ·  NATS PUB/SUB  ·  PROCESS REWARDS  ·  META-RL  ·  LoRA HOT-SWAP</text>
  </g>

  <!-- Phase badge -->
  <g transform="translate(640, 300)">
    <rect x="-48" y="-10" width="96" height="18" rx="9" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.35"/>
    <text x="0" y="3" text-anchor="middle" fill="#818cf8" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" font-weight="600" letter-spacing="1" opacity="0.5">PHASE 9b</text>
  </g>
</svg>
